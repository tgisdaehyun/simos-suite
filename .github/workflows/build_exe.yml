name: Build EXE

on:
  push:
    tags:
      - 'v*'           # trigger on version tags: v0.2.0, v1.0.0, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version string (e.g. 0.2.0)'
        required: false
        default: 'dev'

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        shell: cmd
        run: |
          pip install --upgrade pip
          pip install pyinstaller udsoncan bleak pyserial numpy pycryptodome python-can
          pip install git+https://github.com/bri3d/sa2_seed_key.git

      - name: Verify headless smoke test passes
        shell: cmd
        run: python -m tests.sim_runner --headless

      - name: Create build directories
        shell: cmd
        run: |
          if not exist build_assets mkdir build_assets
          if not exist build_hooks mkdir build_hooks

      - name: Patch spec if no icon
        shell: python
        run: |
          import re, pathlib
          spec = pathlib.Path('simos_suite.spec').read_text()
          # Remove icon and version references if files don't exist
          if not pathlib.Path('build_assets/simos_suite.ico').exists():
              spec = re.sub(r",\s*\n\s*icon='build_assets/simos_suite\.ico'", '', spec)
          if not pathlib.Path('version_info.txt').exists():
              spec = re.sub(r",\s*\n\s*version='version_info\.txt'", '', spec)
          pathlib.Path('simos_suite.spec').write_text(spec)

      - name: Build EXE
        shell: cmd
        run: pyinstaller simos_suite.spec --clean --noconfirm

      - name: Verify EXE exists
        shell: cmd
        run: |
          if not exist dist\SimosSuite.exe (
            echo ERROR: dist\SimosSuite.exe not found
            exit /b 1
          )
          dir dist\SimosSuite.exe

      - name: Get version
        id: version
        shell: python
        run: |
          import os, subprocess
          # Try tag first, then input, then git describe
          ref = os.environ.get('GITHUB_REF', '')
          if ref.startswith('refs/tags/'):
              version = ref.replace('refs/tags/', '')
          else:
              version = '${{ github.event.inputs.version }}' or 'dev'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')
          print(f'Version: {version}')

      - name: Rename EXE with version
        shell: cmd
        run: |
          copy dist\SimosSuite.exe dist\SimosSuite-${{ steps.version.outputs.version }}.exe

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimosSuite-${{ steps.version.outputs.version }}-windows-x64
          path: dist/SimosSuite-${{ steps.version.outputs.version }}.exe
          retention-days: 90

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Simos Tuning Suite ${{ steps.version.outputs.version }}
          body: |
            ## Simos Tuning Suite ${{ steps.version.outputs.version }}

            ### Download
            **SimosSuite-${{ steps.version.outputs.version }}.exe** — Windows x64, single-file, no install required.

            ### What's included
            - Full 8-tab GUI (Connect, ECU Info, Flash, Tune, Logger, CP Tools, Raw Sniff, Trans)
            - Simos8.5 CAL editor — all 14 tables with axis labels and heat-map
            - ZF8HP / DL501 / DQ250 / DQ381 live data
            - J533 Component Protection probe (CP routine ID: 0x0226, pending hardware confirmation)
            - BLE bridge support (ESP32 firmware: dspl1236/esp32-isotp-ble-bridge-c7vag)

            ### Running
            ```
            SimosSuite.exe              # normal mode
            SimosSuite.exe --ecu SC8    # Simos18 / Golf 7 mode
            SimosSuite.exe --debug      # verbose logging
            ```

            ### First run
            Windows Defender SmartScreen may flag an unsigned EXE. Click "More info" → "Run anyway".
            Source is at github.com/dspl1236/simos-suite — GPL v3.

            ### Requirements
            - Windows 10 or 11, x64
            - Bluetooth 4.0+ adapter (for BLE bridge)
            - J2534 DLL (Tactrix/Mongoose/VNCI) for J2534 interface
          files: |
            dist/SimosSuite-${{ steps.version.outputs.version }}.exe
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'dev') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
