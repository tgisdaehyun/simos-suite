name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test-and-build:
    name: Test + Build EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install dependencies
        shell: cmd
        run: |
          pip install numpy
          pip install git+https://github.com/bri3d/sa2_seed_key.git || echo sa2 optional
          pip install pyinstaller
          pip install udsoncan bleak pyserial pycryptodome python-can websocket-client

      - name: Headless smoke test
        shell: cmd
        run: python -m tests.sim_runner --headless

      - name: Get build number
        id: ver
        shell: python
        run: |
          import subprocess, os
          count = subprocess.check_output(
              ['git', 'rev-list', '--count', 'HEAD']
          ).decode().strip()
          sha = subprocess.check_output(
              ['git', 'rev-parse', '--short', 'HEAD']
          ).decode().strip()
          version = f"0.{count}.0-{sha}"
          print(f"Version: {version}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"version={version}\n")

      - name: Patch version into source
        shell: python
        run: |
          import re, pathlib
          path = pathlib.Path("ui/main_window.py")
          src  = path.read_text(encoding="utf-8")
          src  = re.sub(r'VERSION = "[^"]+"',
                        'VERSION = "${{ steps.ver.outputs.version }}"', src)
          path.write_text(src, encoding="utf-8")
          print("Patched VERSION in ui/main_window.py")

      - name: Build EXE
        shell: cmd
        run: python build_exe.py --no-test --no-upx

      - name: Verify EXE
        shell: cmd
        run: |
          if not exist dist\SimosSuite.exe (
            echo ERROR: SimosSuite.exe not found
            exit /b 1
          )
          dir dist\SimosSuite.exe

      - name: Rename EXE with version
        shell: cmd
        run: |
          copy dist\SimosSuite.exe "dist\SimosSuite-${{ steps.ver.outputs.version }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimosSuite-${{ steps.ver.outputs.version }}
          path: dist/SimosSuite-${{ steps.ver.outputs.version }}.exe
          retention-days: 14
          overwrite: true

      - name: Update rolling dev release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Dev Build — ${{ steps.ver.outputs.version }}"
          body: |
            Automated build from latest commit on main.
            Version: `${{ steps.ver.outputs.version }}`
            Commit: ${{ github.sha }}
          prerelease: true
          files: dist/SimosSuite-${{ steps.ver.outputs.version }}.exe
          fail_on_unmatched_files: true
