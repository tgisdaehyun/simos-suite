name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install numpy
          pip install git+https://github.com/bri3d/sa2_seed_key.git || true
      - name: Headless smoke test
        run: python -m tests.sim_runner --headless
      - name: Backend tests
        run: python -m tests.sim_ecu && python -m tests.sim_trans
      - name: Import chain
        run: python -c "from core.ecu_defs import SIMOS85; from core.trans_defs import TRANS_REGISTRY; print('OK')"

  build-exe:
    name: Build Windows EXE (x86)
    needs: test
    if: github.event_name == 'push'   # build/publish the release only on push to main, never on PRs
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # x86 (32-bit) — required for all 32-bit J2534 DLLs
      - name: Set up Python 3.11 x86
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x86"

      - name: Install dependencies
        shell: cmd
        run: |
          pip install pyinstaller
          pip install udsoncan bleak pyserial numpy pycryptodome python-can websocket-client
          pip install git+https://github.com/bri3d/sa2_seed_key.git
          python -c "import struct; print('Python arch:', struct.calcsize('P')*8, 'bit')"

      - name: Build EXE
        shell: cmd
        run: python build_exe.py --no-test --no-upx

      - name: Verify EXE
        shell: cmd
        run: |
          if not exist dist\SimosSuite.exe (echo MISSING && exit /b 1)
          dir dist\SimosSuite.exe

      - name: Delete old releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release delete dev-latest --yes 2>/dev/null || true
          git push origin :refs/tags/dev-latest 2>/dev/null || true

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "SimosSuite — Latest Build"
          body: |
            **Simos Diagnostics Suite — x86 build for J2534 cables**

            Download SimosSuite.exe and run — no install needed.

            Works with MongoosePro VW, MongoosePro ISO2, Tactrix OpenPort, VNCI 6154A,
            ESP32 BLE/USB bridge, and SocketCAN.

            Commit: ${{ github.sha }}
          prerelease: false
          files: dist/SimosSuite.exe
          fail_on_unmatched_files: true
