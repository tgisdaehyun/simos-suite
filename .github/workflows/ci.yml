name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install numpy
          pip install git+https://github.com/bri3d/sa2_seed_key.git || true
      - name: Headless smoke test
        run: python -m tests.sim_runner --headless
      - name: Backend tests
        run: python -m tests.sim_ecu && python -m tests.sim_trans
      - name: Import chain
        run: python -c "from core.ecu_defs import SIMOS85; from core.trans_defs import TRANS_REGISTRY; print('OK')"

  build-exe:
    name: Build Windows EXE (x86)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get build version
        id: ver
        shell: python
        run: |
          import subprocess, os
          count = subprocess.check_output(['git','rev-list','--count','HEAD']).decode().strip()
          sha   = subprocess.check_output(['git','rev-parse','--short','HEAD']).decode().strip()
          v = f"0.{count}.0-{sha}"
          open(os.environ['GITHUB_OUTPUT'],'a').write(f"version={v}
")
          print(f"Version: {v}")

      # x86 (32-bit) — required for all 32-bit J2534 DLLs
      # All VAG J2534 cables (MongoosePro VW, MongoosePro ISO2, Tactrix, VNCI)
      # ship 32-bit DLLs only. A 32-bit Python process is required to load them.
      # This is the same requirement as VW_Flash and VCDS.
      - name: Set up Python 3.11 x86
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x86"

      - name: Install dependencies
        shell: cmd
        run: |
          pip install pyinstaller
          pip install udsoncan bleak pyserial numpy pycryptodome python-can websocket-client
          pip install git+https://github.com/bri3d/sa2_seed_key.git
          python -c "import struct; print('Python arch:', struct.calcsize('P')*8, 'bit')"

      - name: Patch version
        shell: python
        run: |
          import re, pathlib
          p = pathlib.Path("ui/main_window.py")
          src = p.read_text(encoding="utf-8")
          src = re.sub(r'VERSION = "[^"]+"', 'VERSION = "${{ steps.ver.outputs.version }}"', src)
          p.write_text(src, encoding="utf-8")

      - name: Build EXE
        shell: cmd
        run: python build_exe.py --no-test --no-upx

      - name: Verify EXE
        shell: cmd
        run: |
          if not exist dist\SimosSuite.exe (echo MISSING && exit /b 1)
          dir dist\SimosSuite.exe

      - name: Rename EXE
        shell: cmd
        run: copy dist\SimosSuite.exe "dist\SimosSuite-${{ steps.ver.outputs.version }}-x86.exe"

      - name: Prune old dev-latest assets (keep 4 so new upload = 5 total)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="dev-latest"
          KEEP=4

          # Get the release id for dev-latest (may not exist yet on first run)
          RELEASE_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)

          if [ -z "$RELEASE_ID" ]; then
            echo "No existing dev-latest release — nothing to prune."
            exit 0
          fi

          # Fetch all assets sorted oldest-first, delete everything beyond KEEP
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?per_page=100" \
            | python3 -c "
          import json, sys
          assets = sorted(json.load(sys.stdin), key=lambda a: a['created_at'])
          to_delete = assets[:-$KEEP] if len(assets) > $KEEP else []
          for a in to_delete:
              print(a['id'])
          " | while read asset_id; do
            echo "Deleting asset $asset_id..."
            curl -s -o /dev/null -w "%{http_code}
" -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$asset_id"
          done

      - name: Update rolling dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Dev Build — ${{ steps.ver.outputs.version }}"
          body: |
            **x86 build — works with all J2534 cables (MongoosePro VW/ISO2, Tactrix, VNCI)**

            Two DLLs available in the Connect tab:
            - **MongoosePro VW** — Convenience CAN (J255 climate, seat modules) + Drive Train CAN
            - **MongoosePro ISO2** — Drive Train CAN only (ECU, TCU flash/tune)

            Commit: ${{ github.sha }}
          prerelease: true
          files: |
            dist/SimosSuite-${{ steps.ver.outputs.version }}-x86.exe
          fail_on_unmatched_files: true
