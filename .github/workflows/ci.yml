name: CI

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Tests — run on every push ───────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          pip install numpy
          pip install git+https://github.com/bri3d/sa2_seed_key.git || true

      - name: Headless smoke test
        run: python -m tests.sim_runner --headless

      - name: ECU + trans backend tests
        run: |
          python -m tests.sim_ecu
          python -m tests.sim_trans

      - name: Import chain
        run: |
          python -c "from core.ecu_defs import SIMOS85; print('core OK')"
          python -c "from tuner.cal_parser import CalParser; print('cal_parser OK')"

  # ── Build EXE — only on v* tags, after tests pass ──────────────────────────
  build-exe:
    name: Build Windows EXE
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install dependencies
        shell: cmd
        run: |
          pip install pyinstaller
          pip install udsoncan bleak pyserial numpy pycryptodome python-can websocket-client
          pip install git+https://github.com/bri3d/sa2_seed_key.git

      - name: Build EXE
        shell: cmd
        run: python build_exe.py --no-test --no-upx

      - name: Verify EXE
        shell: cmd
        run: |
          if not exist dist\SimosSuite.exe (
            echo ERROR: SimosSuite.exe not found
            exit /b 1
          )
          dir dist\SimosSuite.exe

      - name: Get version from tag
        id: version
        shell: python
        run: |
          import os
          ref = os.environ.get('GITHUB_REF', '')
          version = ref.replace('refs/tags/', '') if ref.startswith('refs/tags/') else 'dev'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')
          print(f'Version: {version}')

      - name: Rename EXE
        shell: cmd
        run: copy dist\SimosSuite.exe "dist\SimosSuite-${{ steps.version.outputs.version }}.exe"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SimosSuite-${{ steps.version.outputs.version }}.exe
          fail_on_unmatched_files: true
