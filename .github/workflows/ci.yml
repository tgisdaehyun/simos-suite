name: CI

on:
  push:
    branches: [main, dev]
    tags-ignore:
      - 'v*'  # v* tags are handled by build_exe.yml
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests — Linux, no hardware deps ──────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal deps (no hardware stack)
        run: |
          pip install numpy
          pip install git+https://github.com/bri3d/sa2_seed_key.git || true
          echo "Hardware deps (udsoncan/bleak/pyserial) skipped in CI"

      - name: Headless smoke test
        run: python -m tests.sim_runner --headless

      - name: ECU backend tests
        run: python -m tests.sim_ecu

      - name: Transmission backend tests
        run: python -m tests.sim_trans

      - name: Full test runner
        run: python -m tests --headless

      - name: Import chain verification
        run: |
          python -c "
          from core.ecu_defs import (
              ECU_REGISTRY, TCU_REGISTRY,
              SIMOS85, SIMOS12, SIMOS122, SIMOS18,
              ZF8HP, DL501, DQ250, DQ381,
          )
          print(f'core OK — {len(ECU_REGISTRY)} ECUs, {len(TCU_REGISTRY)} TCUs')
          "
          python -c "from core.trans_defs import TRANS_REGISTRY, ECU_DEFAULT_TRANS; print('trans_defs OK')"
          python -c "from logger import LogSession, SIMOS85_CHANNELS, Channel; print('logger OK')"
          python -c "from tuner.cal_parser import CalParser; print('cal_parser OK')"
          python -c "
          from cp_tools.mwb_extract import load_confirmed_routine_id
          rid = load_confirmed_routine_id()
          print(f'cp_tools OK — CP_ROUTINE_ID={hex(rid) if rid else \"pending confirmation\"}')
          "

  # ── Windows EXE build — runs after tests pass ──────────────────────────────
  build-exe:
    name: Build Windows EXE
    needs: test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11 (64-bit)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install all dependencies
        shell: cmd
        run: |
          pip install pyinstaller
          pip install udsoncan bleak pyserial numpy pycryptodome python-can
          pip install git+https://github.com/bri3d/sa2_seed_key.git
          python -c "import udsoncan, bleak, serial, numpy, Crypto; print('All deps OK')"

      - name: Build EXE
        shell: cmd
        run: python build_exe.py --no-test --no-upx

      - name: Verify EXE exists and runs
        shell: cmd
        run: |
          if not exist dist\SimosSuite.exe (
            echo ERROR: dist\SimosSuite.exe not found
            exit /b 1
          )
          dir dist\SimosSuite.exe
          echo EXE verified.

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimosSuite-windows-x64-${{ github.sha }}
          path: dist/SimosSuite.exe
          retention-days: 30
