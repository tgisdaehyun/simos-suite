name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  # ── Backend tests (Linux, no hardware deps) ────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install numpy
          pip install git+https://github.com/bri3d/sa2_seed_key.git || true
          echo "Hardware deps (udsoncan/bleak/pyserial) skipped for CI"

      - name: Headless smoke test
        run: python -m tests.sim_runner --headless

      - name: ECU backend tests
        run: python -m tests.sim_ecu

      - name: Transmission backend tests
        run: python -m tests.sim_trans

      - name: Full test runner
        run: python -m tests --headless

      - name: Import chain verification
        run: |
          python -c "from core.ecu_defs import ECU_REGISTRY, TCU_REGISTRY, SIMOS85, ZF8HP; print('core OK')"
          python -c "from core.trans_defs import TRANS_REGISTRY, ECU_DEFAULT_TRANS; print('trans_defs OK')"
          python -c "from logger import LogSession, SIMOS85_CHANNELS, Channel; print('logger OK')"
          python -c "from tuner.cal_parser import CalParser; print('cal_parser OK')"
          python -c "from cp_tools.mwb_extract import load_confirmed_routine_id; rid=load_confirmed_routine_id(); print(f'cp_tools OK (routine_id={rid})')"

  # ── Windows EXE build (only on release tag or manual push to main) ─────────
  build-exe:
    needs: test
    runs-on: windows-latest
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11 (64-bit)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install all dependencies
        run: |
          pip install pyinstaller
          pip install udsoncan bleak pyserial numpy pycryptodome
          pip install git+https://github.com/bri3d/sa2_seed_key.git
          python -c "import udsoncan, bleak, serial, numpy, Crypto; print('All deps OK')"

      - name: Run smoke test before build
        run: python -m tests.sim_runner --headless

      - name: Build EXE
        run: python build_exe.py --no-test --no-upx
        # UPX not in GitHub Actions runner by default — skip for CI builds
        # Add --sign if you add cert to repo secrets

      - name: Verify EXE
        run: |
          dist\simos_suite.exe --version
          dist\simos_suite.exe --headless

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: simos_suite-windows-x64
          path: dist/simos_suite.exe
          retention-days: 30

      - name: Attach EXE to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/simos_suite.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
